<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>행복한 산행 산악회 - 버스 좌석 배치</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
  :root {
    --green:#1D9E75; --green-dark:#0F6E56; --green-light:#9FE1CB;
    --gray-50:#f9fafb; --gray-100:#f3f4f6; --gray-200:#e5e7eb;
    --gray-400:#9ca3af; --gray-500:#6b7280; --gray-700:#374151; --gray-900:#111827;
    --radius:10px; --shadow:0 2px 8px rgba(0,0,0,0.08);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}

  /* ── PC 기본: 꽉 차는 전체화면 레이아웃 ── */
  body{
    font-family:'Noto Sans KR',sans-serif;
    background:#f0f4f8; color:var(--gray-900);
    display:flex; flex-direction:column; height:100vh; overflow:hidden;
  }
  #appScreen{display:flex;flex-direction:column;flex:1;min-height:0;}
  .top-bar{
    background:#fff;padding:8px 14px;
    display:flex;align-items:center;justify-content:space-between;
    box-shadow:var(--shadow);flex-shrink:0;
  }
  .top-bar h2{font-size:14px;font-weight:700;color:var(--gray-900);}

  .main-layout{
    display:flex;gap:10px;padding:10px;
    flex:1;overflow:hidden;min-height:0;
  }
  .left-panel{
    flex:0 0 600px;display:flex;flex-direction:column;gap:8px;overflow:hidden;
  }
  .card{background:#fff;border-radius:var(--radius);padding:14px;box-shadow:var(--shadow);}
  .card-title{font-size:15px;font-weight:700;color:var(--gray-500);letter-spacing:.03em;margin-bottom:10px;}

  .name-input-row{display:flex;gap:8px;margin-bottom:10px;}
  .name-input-row input{
    flex:1;padding:10px 12px;border:1.5px solid var(--gray-200);
    border-radius:7px;font-size:18px;font-family:inherit;
    outline:none;color:var(--gray-900);background:var(--gray-50);transition:border-color .2s;
  }
  .name-input-row input:focus{border-color:var(--green);background:#fff;}
  .add-btn{
    padding:10px 16px;border:none;border-radius:7px;
    background:var(--green);color:#fff;font-size:22px;
    cursor:pointer;line-height:1;transition:background .15s;
  }
  .add-btn:hover{background:var(--green-dark);}

  .name-list-wrap{flex:1;overflow-y:auto;min-height:0;}
  .name-list{display:flex;flex-direction:column;gap:6px;}
  .name-tag{
    display:flex;align-items:center;gap:8px;
    padding:8px 12px;border-radius:7px;
    border:1.5px solid var(--gray-200);
    background:var(--gray-50);font-size:18px;
    cursor:pointer;user-select:none;color:var(--gray-700);transition:all .15s;
  }
  .name-tag:hover{border-color:var(--green-light);}
  .name-tag.assigned{background:#eff6ff;border-color:#bfdbfe;color:#1e40af;}
  .name-tag.active{background:var(--green);border-color:var(--green);color:#fff;font-weight:600;}
  .order-badge{
    font-size:13px;background:rgba(0,0,0,.08);
    border-radius:4px;padding:2px 6px;font-weight:600;flex-shrink:0;
  }
  .name-tag.active .order-badge{background:rgba(255,255,255,.25);}
  .seat-info-pill{font-size:14px;opacity:.8;white-space:nowrap;}
  .drag-handle{
    flex-shrink:0;cursor:grab;color:var(--gray-400,#9ca3af);font-size:16px;
    touch-action:none;padding:0 2px;
  }
  .name-tag.dragging{opacity:.4;}
  .name-tag.drag-over{border-color:var(--green);box-shadow:0 0 0 2px var(--green-light,#86efac) inset;}
  .admin-badge{
    font-size:11px;font-weight:700;color:#fff;background:#f59e0b;
    border-radius:4px;padding:1px 6px;margin-left:6px;flex-shrink:0;
  }
  .del-btn{
    margin-left:auto;width:22px;height:22px;
    border:none;border-radius:50%;background:rgba(0,0,0,.1);color:currentColor;
    font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;
    flex-shrink:0;padding:0;line-height:1;
  }
  .confirm-btn{
    width:100%;padding:12px;font-size:18px;font-weight:700;
    border-radius:7px;cursor:pointer;border:none;
    background:var(--green);color:#fff;display:none;
    font-family:inherit;transition:background .15s;
  }
  .confirm-btn:hover{background:var(--green-dark);}
  .info-bar{
    font-size:15px;color:var(--gray-500);padding:10px 12px;
    background:var(--gray-50);border-radius:7px;line-height:1.5;
    border:1px solid var(--gray-200);
  }
  .right-panel{flex:1;display:flex;flex-direction:column;min-width:0;min-height:0;}
  .bus-card{
    background:#fff;border-radius:var(--radius);padding:10px;box-shadow:var(--shadow);
    flex:1;display:flex;flex-direction:column;min-height:0;
  }
  .bus-card svg{flex:1;width:100%;height:100%;display:block;min-height:0;}

  #toast{
    position:fixed;bottom:20px;left:50%;
    transform:translateX(-50%) translateY(60px);
    background:var(--gray-900);color:#fff;
    padding:8px 16px;border-radius:20px;font-size:12px;
    font-weight:500;transition:transform .3s ease;
    z-index:999;white-space:nowrap;pointer-events:none;
  }
  #toast.show{transform:translateX(-50%) translateY(0);}

  /* ── 스마트폰 가로 (landscape): PC처럼 좌우 꽉 차게 ── */
  @media (max-width:900px) and (orientation:landscape) {
    body{height:100vh;overflow:hidden;}
    .main-layout{padding:6px;gap:6px;}
    .left-panel{flex:0 0 42vw;}
    .card{padding:8px;}
    .card-title{font-size:3vw;margin-bottom:6px;}
    .name-input-row input{font-size:3.2vw;padding:6px 8px;}
    .add-btn{font-size:4vw;padding:6px 10px;}
    .name-tag{font-size:3vw;padding:5px 8px;gap:5px;}
    .order-badge{font-size:2.5vw;padding:1px 4px;}
    .seat-info-pill{font-size:2.5vw;}
    .del-btn{width:4vw;height:4vw;font-size:2.5vw;}
    .confirm-btn{font-size:3.2vw;padding:7px;}
    .info-bar{font-size:2.8vw;padding:6px 8px;}
    .top-bar h2{font-size:3vw;}
    .top-bar{padding:5px 10px;}
  }

  /* ── 스마트폰 세로 (portrait): 위=명단 / 아래=버스 ── */
  @media (max-width:900px) and (orientation:portrait) {
    body{height:auto;overflow:auto;}
    #appScreen{height:auto;}
    .main-layout{
      flex-direction:column;
      padding:8px;gap:8px;
      overflow:visible;
    }
    .left-panel{flex:none;width:100%;overflow:visible;}
    .name-list-wrap{overflow-y:visible;max-height:none;}
    .right-panel{flex:none;width:100%;}
    .bus-card{flex:none;}
    .bus-card svg{flex:none;height:auto;}
    /* 글씨/버튼 크기 vw 기반 */
    .card{padding:10px;}
    .card-title{font-size:4vw;margin-bottom:8px;}
    .name-input-row input{font-size:4.5vw;padding:8px 10px;}
    .add-btn{font-size:6vw;padding:8px 14px;}
    .name-tag{font-size:4vw;padding:7px 10px;gap:6px;}
    .order-badge{font-size:3.2vw;padding:1px 4px;}
    .seat-info-pill{font-size:3vw;}
    .del-btn{width:5.5vw;height:5.5vw;font-size:3.2vw;}
    .confirm-btn{font-size:4.5vw;padding:10px;}
    .info-bar{font-size:3.5vw;padding:8px 10px;}
    .top-bar h2{font-size:4vw;}
    .top-bar{padding:8px 12px;}
  }

/* ===== 초기 접속 화면 ===== */
#setupScreen{
  position:fixed; inset:0; z-index:9999;
  background:linear-gradient(135deg,#e8f5f0,#dceef8);
  display:flex; align-items:center; justify-content:center;
  padding:20px;
}
.setup-box{
  width:min(95vw,520px);
  min-height:70vh;
  background:#fff;
  border-radius:30px;
  box-shadow:0 12px 40px rgba(0,0,0,.12);
  padding:32px 24px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:18px;
}
.setup-logo{
  width:100%;max-width:320px;height:auto;max-height:200px;
  border-radius:22px;object-fit:contain;
  box-shadow:0 4px 18px rgba(0,0,0,.12);
}
.setup-title{
  font-size:28px;font-weight:800;color:#0F6E56;
}
.setup-input{
  width:100%;
  padding:15px 18px;
  border-radius:16px;
  border:2px solid #d1d5db;
  font-size:18px;
}
.setup-btn{
  width:100%;
  padding:15px;
  border:none;
  border-radius:16px;
  background:#1D9E75;
  color:#fff;
  font-size:20px;
  font-weight:700;
  cursor:pointer;
}
.warning-text{
  color:#b91c1c;
  font-family:"궁서","Gungsuh",serif;
  text-align:center;
  font-size:18px;
  font-weight:700;
  margin-bottom:8px;
}
.move-guide{
  margin-top:10px;
  padding:10px 14px;
  border-radius:12px;
  background:#eadcff;
  color:#6b21a8;
  font-size:14px;
  text-align:center;
  display:none;
}
@media (max-width:900px) and (orientation:portrait){
  .setup-box{
    width:100%;
    min-height:100%;
    border-radius:0;
  }
}


/* ── 삭제 확인 모달 ── */
#deleteModal{
  display:none;
  position:fixed;inset:0;z-index:10000;
  background:rgba(0,0,0,.45);
  align-items:center;justify-content:center;
}
#deleteModal.show{display:flex;}
.delete-box{
  background:#fff;border-radius:14px;
  padding:24px 22px 18px;
  box-shadow:0 8px 32px rgba(0,0,0,.18);
  max-width:300px;width:90%;
  text-align:center;
}
.delete-box p{
  font-size:16px;font-weight:600;
  color:var(--gray-900);margin-bottom:18px;line-height:1.5;
}
.delete-box .del-name{
  color:#ef4444;font-weight:700;
}
.delete-actions{display:flex;gap:10px;}
.delete-actions button{
  flex:1;padding:11px 0;font-size:15px;font-weight:700;
  border-radius:8px;cursor:pointer;border:none;font-family:inherit;
  transition:background .15s;
}
.btn-confirm-del{background:#ef4444;color:#fff;}
.btn-confirm-del:hover{background:#dc2626;}
.btn-cancel-del{background:var(--gray-100);color:var(--gray-700);border:1.5px solid var(--gray-200)!important;}
.btn-cancel-del:hover{background:var(--gray-200);}

/* 순서 경고 배너 - 항상 1줄 */
#seqWarn{
  display:none;position:fixed;top:0;left:0;right:0;z-index:9000;
  background:#b91c1c;color:#fff;font-weight:700;text-align:center;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  font-size:clamp(10px,3vw,17px);padding:.55em 1em;
  box-shadow:0 2px 6px rgba(0,0,0,.3);
}
</style>
</head>
<body>

<div id="seqWarn"></div>

<!-- 삭제 확인 모달 -->
<div id="deleteModal">
  <div class="delete-box">
    <p><span class="del-name" id="delTargetName"></span><br>삭제하시겠습니까?</p>
    <div class="delete-actions">
      <button class="btn-confirm-del" id="btnConfirmDel">예</button>
      <button class="btn-cancel-del" id="btnCancelDel">아니오</button>
    </div>
  </div>
</div>

<div id="setupScreen">
  <div class="setup-box">
    <img class="setup-logo" src="" id="setupLogo">
    <div class="setup-title">행복한산행산악회</div>
    <!-- 신규: 산행대장 입력 / 기존: 자동 표시 -->
    <div id="leaderNew" style="width:100%">
      <input class="setup-input" id="leaderInput" placeholder="산행대장 입력">
    </div>
    <div id="leaderOld" style="display:none;width:100%;padding:13px 18px;
      border-radius:16px;background:#e8f5f0;border:2px solid #1D9E75;
      font-size:18px;font-weight:700;color:#0F6E56;text-align:center;"></div>
    <div id="adminClaimRow" style="display:none;width:100%;text-align:center;margin-top:-8px;">
      <a href="javascript:void(0)" id="adminClaimLink" style="font-size:13px;color:var(--gray-500,#6b7280);text-decoration:underline;">본인이 산행대장이신가요? (관리자 인증)</a>
    </div>
    <input class="setup-input" id="tripInput" type="text" placeholder="산행제목 입력">
    <button class="setup-btn" id="enterBtn" onclick="enterBusApp()">입장하기</button>
  </div>
</div>

<div id="appScreen" style="display:none;">
  <div class="top-bar">
    <h2 id="clubTitle">🚌 행복한산행산악회</h2>
  </div>
  <div class="main-layout">
    <div class="left-panel">
      <div class="card" style="flex:1;display:flex;flex-direction:column;min-height:0;">
        <div class="card-title">👥 탑승자 명단</div>
        <div class="name-input-row" id="addNameRow">
          <input id="nameInput" type="text" placeholder="닉네임/탑승지 입력" maxlength="16"/>
          <button class="add-btn" onclick="addName()">＋</button>
        </div>
        <div class="name-list-wrap">
          <div class="name-list" id="nameList"></div>
        </div>
      </div>
      <div class="card" style="display:flex;flex-direction:column;gap:6px;">
        <div class="warning-text">다른 산우들을 위해 신중한 좌석 지정바랍니다</div>
<button class="confirm-btn" id="confirmBtn" onclick="confirmSeat()">✓ 좌석 지정 완료</button>
        <div class="info-bar" id="infoBar">탑승자를 추가하고 이름을 선택하세요.</div>
      </div>
    </div>
    <div class="right-panel">
      <div class="bus-card">
        <svg id="busSvg" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet"></svg>
      </div>
    </div>
  </div>
</div>
<div id="toast"></div>

// 아래 값을 Firebase 콘솔에서 복사한 값으로 교체하세요
const FIREBASE_URL = 'https://seat31-42db2-default-rtdb.asia-southeast1.firebasedatabase.app';
// =========================

let names=[], seatMap={}, activeIdx=null, pendingSeat=null, isAdmin=false;
let currentTripKey = null;
let lastSave = 0; // 저장 후 폴링 덮어쓰기 방지

function tripToKey(trip) {
  return encodeURIComponent(trip).replace(/%/g, '_');
}

async function saveDB() {
  if(!currentTripKey) return;
  lastSave = Date.now();
  try {
    await fetch(`${FIREBASE_URL}/trips/${currentTripKey}/seats.json`, {
      method: 'PUT',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ names, seatMap })
    });
  } catch(e) { console.error('저장 실패', e); }
}

async function loadDB() {
  if(!currentTripKey) return;
  try {
    const res = await fetch(`${FIREBASE_URL}/trips/${currentTripKey}/seats.json`);
    if(!res.ok) return;
    const d = await res.json();
    if(d && Array.isArray(d.names)){ names=d.names; seatMap=d.seatMap||{}; }
  } catch(e) { console.error('로드 실패', e); }
}

    if(Date.now() - lastSave < 5000) return;
    try {
      const res = await fetch(`${FIREBASE_URL}/trips/${currentTripKey}/seats.json`);
      if(!res.ok) return;
      const d = await res.json();
      if(d && Array.isArray(d.names)){
        names=d.names; seatMap=d.seatMap||{};
        renderBus(); renderNames(); updateInfo();
      }
    } catch(e) {}
  }, 3000);
}

function saveLocal() { saveDB(); }

function addName() {
  if(!isAdmin) return;
  const inp = document.getElementById('nameInput');
  const v = inp.value.trim();
  if(!v) return;
  names.push({name:v, seatNum:null, confirmed:false});
  inp.value=''; inp.focus();
  saveLocal(); renderNames(); renderBus(); updateInfo();
}

let _pendingDeleteIdx = null;

function deleteName(i, e) {
  if(!isAdmin) return;
  e.stopPropagation();
  _pendingDeleteIdx = i;
  const nm = names[i] ? names[i].name : '';
  document.getElementById('delTargetName').textContent = `"${nm}"`;
  document.getElementById('deleteModal').classList.add('show');
}

function _doDelete() {
  const i = _pendingDeleteIdx;
  if(i === null) return;
  _pendingDeleteIdx = null;
  document.getElementById('deleteModal').classList.remove('show');
  if(activeIdx===i) { activeIdx=null; pendingSeat=null; }
  else if(activeIdx>i) activeIdx--;
  for(const k in seatMap) {
    if(seatMap[k]===i) delete seatMap[k];
    else if(seatMap[k]>i) seatMap[k]--;
  }
  names.splice(i, 1);
  saveLocal(); renderNames(); renderBus(); updateInfo();
}

function _cancelDelete() {
  _pendingDeleteIdx = null;
  document.getElementById('deleteModal').classList.remove('show');
}

document.getElementById('btnConfirmDel').addEventListener('click', _doDelete);
document.getElementById('btnCancelDel').addEventListener('click', _cancelDelete);
document.getElementById('deleteModal').addEventListener('click', function(e){
  if(e.target === this) _cancelDelete();
});

function allConfirmed() {
  return names.length > 0 && names.every(n => n.confirmed);
}

function selectPerson(i) {
  const all = allConfirmed();

  if(all) {
    // 전원 완료 모드: 누구든 자유롭게 선택 가능
    if(activeIdx === i) {
      activeIdx=null; pendingSeat=null;
      document.getElementById('confirmBtn').style.display='none';
      renderNames(); renderBus(); updateInfo(); return;
    }
    activeIdx=i;
    pendingSeat=names[i].seatNum||null;
    document.getElementById('confirmBtn').style.display='block';
    renderNames(); renderBus(); updateInfo();
    return;
  }

  // 순서 모드: 미완료 첫 번째만 선택 가능
  const nextIdx = names.findIndex(n => !n.confirmed);
  if(names[i] && names[i].confirmed){
    showWarn('앞 사람의 좌석 지정이 완료되어야 좌석 지정이 가능합니다');
    return;
  }
  if(nextIdx !== -1 && i !== nextIdx){
    showWarn('앞 사람의 좌석 지정이 완료되어야 좌석 지정이 가능합니다');
    return;
  }
  if(activeIdx===i) {
    activeIdx=null; pendingSeat=null;
    document.getElementById('confirmBtn').style.display='none';
    renderNames(); renderBus(); updateInfo(); return;
  }
  activeIdx=i;
  pendingSeat=names[i].seatNum||null;
  document.getElementById('confirmBtn').style.display='block';
  renderNames(); renderBus(); updateInfo();
}

function selectSeat(seatNum) {
  if(activeIdx===null) return;
  const owner=seatMap[seatNum];
  // 전원 완료 모드: 빈 자리만 선택 가능 (다른 사람 자리는 이동 불가)
  if(allConfirmed()) {
    if(owner!==undefined && owner!==activeIdx) {
      updateInfo('이미 다른 분이 사용 중인 좌석입니다.'); return;
    }
  } else {
    if(owner!==undefined && owner!==activeIdx && names[owner] && names[owner].confirmed) {
      updateInfo('이미 다른 분이 확정한 좌석입니다.'); return;
    }
  }
  if(pendingSeat!==null && seatMap[pendingSeat]===activeIdx) delete seatMap[pendingSeat];
  if(owner!==undefined && owner!==activeIdx && names[owner]) names[owner].seatNum=null;
  pendingSeat=seatNum;
  seatMap[seatNum]=activeIdx;
  names[activeIdx].seatNum=seatNum;
  saveLocal(); renderBus(); renderNames(); updateInfo();
}

function confirmSeat() {
  if(activeIdx===null||pendingSeat===null) { updateInfo('먼저 좌석을 선택해 주세요.'); return; }
  names[activeIdx].confirmed=true;
  activeIdx=null; pendingSeat=null;
  document.getElementById('confirmBtn').style.display='none';
  saveLocal(); renderNames(); renderBus(); updateInfo();
}

function updateInfo(msg) {
  const info=document.getElementById('infoBar');
  if(msg) { info.textContent=msg; return; }
  const total=names.length;
  if(total===0) { info.textContent='탑승자를 추가하고 이름을 선택하세요.'; return; }
  const confirmed=names.filter(n=>n.confirmed).length;
  if(activeIdx!==null) {
    info.textContent=names[activeIdx].name+' 님 좌석 선택 중...'; return;
  }
  if(confirmed===total) { info.textContent='모든 탑승자('+total+'명) 배치 완료! 🎉'; return; }
  info.textContent='이름 터치 후 좌석 선택 ('+confirmed+'/'+total+' 완료)';
}

function renderNames() {
  const list=document.getElementById('nameList');
  list.innerHTML='';
  const nextIdx=names.findIndex(n=>!n.confirmed);
  names.forEach((n,i)=>{
    const div=document.createElement('div');
    let cls='name-tag';
    if(i===activeIdx) cls+=' active';
    else if(n.confirmed) cls+=' assigned';
    div.className=cls;
    div.dataset.idx=i;
    const isLocked=!allConfirmed()&&!n.confirmed&&i!==activeIdx&&nextIdx!==-1&&i>nextIdx;
    if(isLocked) div.style.opacity='0.4';

    if(isAdmin){
      const handle=document.createElement('span');
      handle.className='drag-handle'; handle.textContent='⠿';
      handle.addEventListener('pointerdown',(e)=>startDrag(e,i));
      div.appendChild(handle);
    }

    const badge=document.createElement('span');
    badge.className='order-badge'; badge.textContent=i+1;
    const nameSpan=document.createElement('span'); nameSpan.textContent=n.name;
    div.appendChild(badge); div.appendChild(nameSpan);
    if(i===0 && isAdmin){
      const ab=document.createElement('span');
      ab.className='admin-badge'; ab.textContent='관리자';
      div.appendChild(ab);
    }

    if(n.seatNum) {
      const pill=document.createElement('span');
      pill.className='seat-info-pill';
      pill.textContent=n.seatNum+'번'+(n.confirmed?'✓':'…');
      div.appendChild(pill);
    }
    if(isLocked){
      const lk=document.createElement('span');
      lk.style.cssText='margin-left:auto;font-size:14px;';
      lk.textContent='🔒'; div.appendChild(lk);
    }
    if(isAdmin){
      const delBtn=document.createElement('button');
      delBtn.className='del-btn'; delBtn.textContent='✕';
      delBtn.addEventListener('click',(e)=>deleteName(i,e));
      div.appendChild(delBtn);
    }
    div.addEventListener('click',()=>selectPerson(i));
    list.appendChild(div);
  });
}

// ─── 관리자 전용: 포인터 기반 드래그 순서 변경 (마우스+터치 공용) ───
let _dragState = null;
function startDrag(e, idx){
  if(!isAdmin) return;
  e.preventDefault();
  const list=document.getElementById('nameList');
  const items=[...list.querySelectorAll('.name-tag')];
  const el=items[idx];
  if(!el) return;
  el.classList.add('dragging');
  _dragState = { fromIdx: idx, curIdx: idx, list, items };
  document.addEventListener('pointermove', onDragMove);
  document.addEventListener('pointerup', onDragEnd, {once:true});
}
function onDragMove(e){
  if(!_dragState) return;
  const target=document.elementFromPoint(e.clientX, e.clientY);
  const tag=target && target.closest('.name-tag');
  _dragState.list.querySelectorAll('.name-tag').forEach(el=>el.classList.remove('drag-over'));
  if(tag){
    tag.classList.add('drag-over');
    const idx=Number(tag.dataset.idx);
    if(!isNaN(idx)) _dragState.curIdx=idx;
  }
}
function onDragEnd(){
  document.removeEventListener('pointermove', onDragMove);
  document.querySelectorAll('.name-tag').forEach(el=>el.classList.remove('drag-over','dragging'));
  if(_dragState && _dragState.fromIdx!==_dragState.curIdx){
    reorderName(_dragState.fromIdx, _dragState.curIdx);
  }
  _dragState=null;
}
function reorderName(from, to){
  if(!isAdmin || from===to || !names[from] || !names[to]) return;
  const idxArr=names.map((_,i)=>i);
  const moved=idxArr.splice(from,1)[0];
  idxArr.splice(to,0,moved);
  const oldToNew={};
  idxArr.forEach((oldIdx,newPos)=>{ oldToNew[oldIdx]=newPos; });

  const movedName=names.splice(from,1)[0];
  names.splice(to,0,movedName);

  const newSeatMap={};
  for(const seatNum in seatMap){
    newSeatMap[seatNum]=oldToNew[seatMap[seatNum]];
  }
  seatMap=newSeatMap;
  if(activeIdx!==null) activeIdx=oldToNew[activeIdx];

  saveLocal(); renderNames(); renderBus(); updateInfo();
}

function renderBus() {
  const svg=document.getElementById('busSvg');
  svg.innerHTML='';
  svg.setAttribute('viewBox','0 0 '+SVG_W+' '+SVG_H);
  const ns='http://www.w3.org/2000/svg';
  function el(tag,attrs,txt){
    const e=document.createElementNS(ns,tag);
    for(const k in attrs) e.setAttribute(k,attrs[k]);
    if(txt!==undefined) e.textContent=txt;
    return e;
  }

  svg.appendChild(el('rect',{x:2,y:2,width:SVG_W-4,height:SVG_H-4,rx:16,ry:16,fill:'none',stroke:'#adb5bd','stroke-width':'1.5'}));
  svg.appendChild(el('rect',{x:6,y:6,width:SVG_W-12,height:SVG_H-12,rx:12,ry:12,fill:'#f8f9fa'}));
  svg.appendChild(el('text',{x:SVG_W/2,y:20,fill:'#374151','font-size':'9','text-anchor':'middle','font-weight':'bold'},'좌석 배치도'));

  const drvW=X_L2+W-X_L1-2;
  svg.appendChild(el('rect',{x:X_L1,y:26,width:drvW,height:30,rx:4,fill:'#ffffff',stroke:'#adb5bd','stroke-width':'1'}));
  const logoImg=document.createElementNS(ns,'image');
  logoImg.setAttribute('href', LOGO);
  logoImg.setAttribute('x', X_L1+1);
  logoImg.setAttribute('y', 27);
  logoImg.setAttribute('width', drvW-2);
  logoImg.setAttribute('height', 28);
  logoImg.setAttribute('preserveAspectRatio','xMidYMid meet');
  svg.appendChild(logoImg);

  svg.appendChild(el('rect',{x:X_R,y:26,width:W,height:30,rx:4,fill:'#fef3c7',stroke:'#d97706','stroke-width':'1'}));
  svg.appendChild(el('text',{x:X_R+W/2,y:38,fill:'#92400e','font-size':'7','text-anchor':'middle'},'출입문'));
  svg.appendChild(el('text',{x:X_R+W/2,y:51,fill:'#92400e','font-size':'8','text-anchor':'middle'},'🚪'));

  svg.appendChild(el('line',{x1:X_L2+W+2,y1:70,x2:X_L2+W+2,y2:SVG_H-6,stroke:'#d1d5db','stroke-width':'1','stroke-dasharray':'3 3'}));


  SEAT_LAYOUT.forEach(seat=>{
    const ownerIdx=seatMap[seat.num];
    const hasOwner=ownerIdx!==undefined&&names[ownerIdx];
    const isConfirmed=hasOwner&&names[ownerIdx].confirmed;
    const isActive=hasOwner&&ownerIdx===activeIdx;
    let fill='#f3f4f6', stroke='#adb5bd';
    if(isConfirmed){fill='#B5D4F4';stroke='#378ADD';}
    else if(isActive){fill='#9FE1CB';stroke='#1D9E75';}

    const g=el('g',{'data-seat':seat.num});
    g.style.cursor='pointer';
    g.appendChild(el('rect',{x:seat.x,y:seat.y,width:W,height:H,rx:4,ry:4,fill,stroke,'stroke-width':'1.2'}));

    if(hasOwner){
      const nm=names[ownerIdx].name;
      // 닉네임/탑승지 분리
      const parts=nm.split('/');
      const nick=(parts[0]||'').trim();
      const stop=(parts[1]||'').trim();

      // 좌석 번호 (우측 상단 작게)
      g.appendChild(el('text',{x:seat.x+W-2,y:seat.y+3,'text-anchor':'end','dominant-baseline':'hanging','font-size':'5.5',fill:isConfirmed?'#378ADD':'#1D9E75','pointer-events':'none'},String(seat.num)));

      if(stop){
        // 닉네임 + 탑승지 두 줄 표시
        const nickShort=nick.length>5?nick.slice(0,4)+'…':nick;
        const stopShort=stop.length>5?stop.slice(0,4)+'…':stop;
        const nickSize=nick.length>=5?'6':'6.5';
        const nickText=el('text',{x:seat.x+W/2,y:seat.y+9,'text-anchor':'middle','dominant-baseline':'hanging','font-size':nickSize,fill:isConfirmed?'#185FA5':'#0F6E56','font-weight':'600','pointer-events':'none'},nickShort);
        const stopText=el('text',{x:seat.x+W/2,y:seat.y+18,'text-anchor':'middle','dominant-baseline':'hanging','font-size':'5.5',fill:isConfirmed?'#378ADD':'#1D9E75','pointer-events':'none'},stopShort);
        g.appendChild(nickText);
        g.appendChild(stopText);
      } else {
        // 닉네임만 표시
        const nickShort=nick.length>5?nick.slice(0,4)+'…':nick;
        const nickSize=nick.length>=5?'6':'7';
        g.appendChild(el('text',{x:seat.x+W/2,y:seat.y+H/2,'text-anchor':'middle','dominant-baseline':'middle','font-size':nickSize,fill:isConfirmed?'#185FA5':'#0F6E56','pointer-events':'none'},nickShort));
      }
    } else {
      g.appendChild(el('text',{x:seat.x+W/2,y:seat.y+H/2,'text-anchor':'middle','dominant-baseline':'middle','font-size':'9',fill:'#6b7280','pointer-events':'none'},String(seat.num)));
    }
    g.addEventListener('click',()=>{
      if(activeIdx!==null) selectSeat(seat.num);
      else if(hasOwner) selectPerson(ownerIdx);
    });
    svg.appendChild(g);
  });
}

function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// ─── 경고 배너 ───
function showWarn(msg){
  const b=document.getElementById('seqWarn');
  b.textContent='⚠ '+msg; b.style.display='block';
  clearTimeout(showWarn._t);
  showWarn._t=setTimeout(()=>{ b.style.display='none'; },3500);
}

// ─── 이벤트 (innerHTML 재작성 없이 직접 등록) ───
document.getElementById('nameInput').addEventListener('keydown',function(e){
  if(e.key==='Enter'){ e.preventDefault(); addName(); }
});
document.getElementById('tripInput').addEventListener('keydown',function(e){
  if(e.key==='Enter'){ e.preventDefault(); enterBusApp(); }
});
document.getElementById('leaderInput').addEventListener('keydown',function(e){
  if(e.key==='Enter'){ e.preventDefault(); enterBusApp(); }
});

// 산행제목 blur → DB 조회 → 산행대장 자동 표시
document.getElementById('tripInput').addEventListener('blur', async function(){
  const v=this.value.trim(); if(!v) return;
  const key=tripToKey(v);
  try{
    const r=await fetch(`${FIREBASE_URL}/trips/${key}/meta.json`);
    if(!r.ok) return;
    const m=await r.json();
    if(m&&m.leader){
      document.getElementById('leaderNew').style.display='none';
      const d=document.getElementById('leaderOld');
      d.style.display='block'; d.textContent='🏔 산행대장: '+m.leader;
      const claimRow=document.getElementById('adminClaimRow');
      claimRow.style.display = (localStorage.getItem('admin_'+key)==='1') ? 'none' : 'block';
      claimRow.dataset.leader = m.leader;
      claimRow.dataset.key = key;
    } else {
      document.getElementById('leaderNew').style.display='block';
      document.getElementById('leaderOld').style.display='none';
      document.getElementById('adminClaimRow').style.display='none';
    }
  }catch(e){}
});
document.getElementById('adminClaimLink').addEventListener('click', function(){
  const claimRow=document.getElementById('adminClaimRow');
  const leader=claimRow.dataset.leader, key=claimRow.dataset.key;
  const v=prompt('산행대장 이름을 정확히 입력해주세요.');
  if(v===null) return;
  if(v.trim()===leader){
    localStorage.setItem('admin_'+key,'1');
    claimRow.style.display='none';
    alert('관리자로 인증되었습니다.');
  } else {
    alert('산행대장 이름이 일치하지 않습니다.');
  }
});
document.getElementById('tripInput').addEventListener('input',function(){
  if(!this.value.trim()){
    document.getElementById('leaderNew').style.display='block';
    document.getElementById('leaderOld').style.display='none';
    document.getElementById('adminClaimRow').style.display='none';
  }
});

// 초기 렌더
renderBus(); renderNames(); updateInfo();


// ===== 산행 메타 =====
function updateHeader(leader,trip){
  if(leader&&trip)
    document.getElementById('clubTitle').innerText=
      `🚌 행복한산행산악회 / ${leader} / ${trip}`;
}

async function enterBusApp(){
  const tripVal=document.getElementById('tripInput').value.trim();
  if(!tripVal){ alert('산행제목을 입력해주세요.'); return; }
  const key=tripToKey(tripVal);
  let meta=null;
  try{
    const r=await fetch(`${FIREBASE_URL}/trips/${key}/meta.json`);
    if(r.ok) meta=await r.json();
  }catch(e){ alert('네트워크 오류'); return; }

  if(!meta){
    // 신규 산행 → 산행대장 필수 (개설자 = 관리자)
    const lv=document.getElementById('leaderInput').value.trim();
    if(!lv){ alert('처음 개설 시 산행대장을 입력해주세요.'); return; }
    meta={leader:lv,trip:tripVal};
    try{
      await fetch(`${FIREBASE_URL}/trips/${key}/meta.json`,{
        method:'PUT',headers:{'Content-Type':'application/json'},
        body:JSON.stringify(meta)
      });
    }catch(e){ alert('저장 오류'); return; }
    localStorage.setItem('admin_'+key,'1');
  } else {
    // 기존 산행 → 산행대장 자동 표시 (버튼 클릭 시에도 즉시 반영)
    document.getElementById('leaderNew').style.display='none';
    const d=document.getElementById('leaderOld');
    d.style.display='block'; d.textContent='🏔 산행대장: '+meta.leader;
  }

  currentTripKey=key;
  isAdmin = localStorage.getItem('admin_'+key)==='1';
  await loadDB();
  document.getElementById('setupScreen').style.display='none';
  document.getElementById('appScreen').style.display='flex';
  document.getElementById('addNameRow').style.display = isAdmin ? 'flex' : 'none';
  updateHeader(meta.leader,meta.trip);
  renderBus(); renderNames(); updateInfo();
  startPolling();
}

window.addEventListener('load',()=>{
  document.getElementById('setupLogo').src=LOGO;
});
window.addEventListener('beforeunload',()=>{ if(pollInterval) clearInterval(pollInterval); });

</script>
